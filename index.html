<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Startup App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-950 to-gray-900 text-white p-6">

<!-- LOGIN -->
<div id="loginPage">
  <h1 class="text-3xl font-bold mb-6">เลือกผู้ใช้งาน</h1>
  <div id="userList" class="grid grid-cols-2 gap-4"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div class="flex justify-between items-center mb-4">
    <h1 id="username" class="text-2xl"></h1>
    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">ออก</button>
  </div>

  <!-- SUMMARY -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-red-500/20 p-4 rounded-xl backdrop-blur">
      <div>💸 เราเป็นหนี้</div>
      <div id="totalOwe" class="text-2xl font-bold">0</div>
    </div>
    <div class="bg-green-500/20 p-4 rounded-xl backdrop-blur">
      <div>💰 คนติดเรา</div>
      <div id="totalOwed" class="text-2xl font-bold">0</div>
    </div>
  </div>

  <!-- LIST -->
  <div id="list" class="mb-6"></div>

  <!-- ADD DEBT -->
  <div class="bg-white/10 p-4 rounded-xl mb-4">
    <h2 class="mb-2">➕ เพิ่มคนที่เป็นหนี้เรา</h2>
    <input id="title" placeholder="รายการ" class="w-full mb-2 p-2 text-black">
    <select id="to_user" class="w-full mb-2 p-2 text-black"></select>
    <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full mb-2 p-2 text-black">
    <button onclick="addDebt()" class="bg-blue-500 px-4 py-2 rounded">เพิ่ม</button>
  </div>

  <!-- SPLIT BILL -->
  <div class="bg-white/10 p-4 rounded-xl">
    <h2 class="mb-2">🍜 หารบิล</h2>
    <input id="bill_title" placeholder="ชื่อบิล" class="w-full mb-2 p-2 text-black">
    <input id="bill_amount" type="number" placeholder="ยอดรวม" class="w-full mb-2 p-2 text-black">

    <div id="checkboxUsers" class="mb-2"></div>

    <button onclick="splitBill()" class="bg-purple-500 px-4 py-2 rounded">หาร</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyOJmpwWgfFuar861wPsKLSjAdeIiqnv1DH6r-XlQJhnJeJ6GqUhIue-7soPS8neItt/exec";

let USER = null;
let USERS = {};

// INIT
window.onload = loadUsers;

async function loadUsers(){
  const res = await fetch(API+"?action=getUsers");
  const data = await res.json();

  let html = "";
  let select = "";
  let checkbox = "";

  data.forEach(u=>{
    USERS[u.id] = u.name;

    html += `<button onclick="selectUser(${u.id})" class="bg-blue-600 p-6 rounded-xl">${u.name}</button>`;
    select += `<option value="${u.id}">${u.name}</option>`;
    checkbox += `<label class="block"><input type="checkbox" value="${u.id}"> ${u.name}</label>`;
  });

  document.getElementById('userList').innerHTML = html;
  document.getElementById('to_user').innerHTML = select;
  document.getElementById('checkboxUsers').innerHTML = checkbox;
}

function selectUser(id){
  USER = id;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('username').innerText = '👤 '+USERS[id];
  loadData();
}

function logout(){
  location.reload();
}

async function loadData(){
  const res = await fetch(API+"?action=getDebts&user_id="+USER);
  const data = await res.json();

  let totalOwe = 0;
  let totalOwed = 0;
  let html = "";

  data.forEach(d=>{
    let text="";

    if(d.from_user == USER){
      totalOwe += Number(d.amount);
      text = `เราติด ${USERS[d.to_user]}`;
    } else {
      totalOwed += Number(d.amount);
      text = `${USERS[d.from_user]} ติดเรา`;
    }

    html += `
    <div class="bg-gray-800 p-4 rounded mb-2">
      <div class="font-bold">${d.title}</div>
      <div>${text}</div>
      <div>${d.amount} บาท</div>
      <div>${d.status}</div>
      ${d.status==='pending' && d.from_user==USER ? `
        <button onclick="pay(${d.id})" class="bg-green-500 px-2 py-1 mt-2">ชำระ</button>
      `:''}
    </div>`;
  });

  document.getElementById('totalOwe').innerText = totalOwe;
  document.getElementById('totalOwed').innerText = totalOwed;
  document.getElementById('list').innerHTML = html;
}

async function addDebt(){
  const amount = document.getElementById('amount').value;
  if(!amount || amount<=0) return alert('ใส่เงินให้ถูก');

  await fetch(API,{
    method:'POST',
    body: JSON.stringify({
      action:'addDebt',
      from_user: USER,
      to_user: document.getElementById('to_user').value,
      amount: amount,
      title: document.getElementById('title').value
    })
  });

  loadData();
}

async function splitBill(){
  const total = Number(document.getElementById('bill_amount').value);
  const title = document.getElementById('bill_title').value;

  let people = [];
  document.querySelectorAll('#checkboxUsers input:checked').forEach(c=>{
    if(c.value != USER) people.push(c.value);
  });

  if(people.length===0) return alert('เลือกคน');

  await fetch(API,{
    method:'POST',
    body: JSON.stringify({
      action:'splitBill',
      from_user: USER,
      total: total,
      people: people,
      title: title
    })
  });

  loadData();
}

async function pay(id){
  const method = prompt('cash หรือ slip');

  await fetch(API,{
    method:'POST',
    body: JSON.stringify({
      action:'payDebt',
      id:id,
      method:method
    })
  });

  loadData();
}
</script>

</body>
</html>
